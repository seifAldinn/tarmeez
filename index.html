<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>CRUD</title>
</head>
<body>

    <h1>Product Manager</h1>

<div class="input-group">
    <input id="name" placeholder="Product name">
    <input id="price" placeholder="Price">
    <button class="add-btn" onclick="addProduct()">Add Product</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Price</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border-radius:8px; width:300px;">
        <h3>Edit Product</h3>
        <input id="editName" placeholder="Product name" style="width:100%; padding:8px; margin:10px 0;">
        <input id="editPrice" placeholder="Price" style="width:100%; padding:8px; margin:10px 0;">
        <button onclick="saveEdit()" style="margin-right:10px;">Save</button>
        <button onclick="cancelEdit()">Cancel</button>
    </div>
</div>

<!-- fontawesome -->
    <script src="https://kit.fontawesome.com/7dba689698.js" crossorigin="anonymous"></script>
   <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
